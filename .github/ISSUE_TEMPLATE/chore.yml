    id: purpose
    attributes:
      label: Purpose
      description: Why is this change needed?
      placeholder: e.g., Update dependencies, improve CI config
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: What needs to be done?
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true