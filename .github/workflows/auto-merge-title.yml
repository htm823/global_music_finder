name: Auto-format Merge Commit

on:
  pull_request:
    types: [closed]

jobs:
  format-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Add merge comment
        uses: actions/github-script@v7
        with:
          script: |
            const validTypes = ['feat', 'fix', 'docs', 'refactor', 'chore'];
            const typePattern = new RegExp(`^(${validTypes.join('|')}):\\s*`, 'i');

            const fullTitle = context.payload.pull_request.title;
            const prTitle = fullTitle.replace(typePattern, '');
            const mergeTitle = `merge: ${prTitle}`;

            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Merged successfully**\n\nMerge commit title: \`${mergeTitle}\``
            });