<body>
	<div class="dashboard">
		<aside class="sidebar">
			<div class="sidebar__inner">
				<h1 class="sidebar__title">
					<img src="assets/img/logo.png" class="sidebar__logo" alt="Global Music Finder Logo">
				</h1>
				<nav class="sidebar__menu">
					<ul class="sidebar__languages">
						<li class="sidebar__language">
							<input id="english" class="sidebar__radio" type="radio" name="language" checked>
							<label for="english" class="sidebar__tab">English</label>
						</li>
						<li class="sidebar__language">
							<input id="spanish" class="sidebar__radio" type="radio" name="language">
							<label for="spanish" class="sidebar__tab">Spanish</label>
						</li>
						<li class="sidebar__language">
							<input id="german" class="sidebar__radio" type="radio" name="language">
							<label for="german" class="sidebar__tab">German</label>
						</li>
						<li class="sidebar__language">
							<input id="french" class="sidebar__radio" type="radio" name="language">
							<label for="french" class="sidebar__tab">French</label>
						</li>
						<li class="sidebar__language">
							<input id="korean" class="sidebar__radio" type="radio" name="language">
							<label for="korean" class="sidebar__tab">Korean</label>
						</li>
						<li class="sidebar__language">
							<input id="japanese" class="sidebar__radio" type="radio" name="language">
							<label for="japanese" class="sidebar__tab">Japanese</label>
						</li>
						<li class="sidebar__language">
							<input id="mandarin" class="sidebar__radio" type="radio" name="language">
							<label for="mandarin" class="sidebar__tab">Mandarin</label>
						</li>
						<li class="sidebar__language">
							<input id="hindi" class="sidebar__radio" type="radio" name="language">
							<label for="hindi" class="sidebar__tab">Hindi</label>
						</li>
					</ul>
				</nav>
			</div>
		</aside>
		<main class="search">
			<div class="search__inner">
				<div class="search__languages">

					<!-- English -->
					<div class="search__content is-active" data-tab="english">
						<form class="search__form">
							<div class="search__box">
								<input id="search-en" class="search__input" type="text" placeholder="Artist or track title" autocomplete="off">
								<label for="search-en" class="search__label">Search for an artist or a track</label>
							</div>
							<button type="submit" class="search__btn"><i class="fa-solid fa-magnifying-glass"></i></button>
						</form>
						<div class="search__results" data-country="gb">
							<!-- Results -->
						</div>
					</div>

					<!-- Spanish -->
					<div class="search__content" data-tab="spanish">
						<form class="search__form">
